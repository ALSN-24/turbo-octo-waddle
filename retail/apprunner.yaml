# ─────────────────────────────────────────────────────────────────────────────
# AWS App Runner — retail-crm-v3
#
# Deploy from ECR:
#   1. Build and push the Docker image to ECR (see AWS_DEPLOY.md).
#   2. Create a new App Runner service in the AWS console or via CLI,
#      pointing to your ECR image URI.
#   3. Upload this file as the configuration source, or paste the values
#      into the App Runner console.
#
# Environment variables marked SECRETS must be stored in
# AWS Secrets Manager and referenced by ARN — never hard-code them here.
# ─────────────────────────────────────────────────────────────────────────────

version: 1.0

runtime: nodejs20                # only used for source-based deployments
                                 # (image-based deployments ignore this)

build:                           # only used for source-based deployments
  commands:
    build:
      - npm ci --frozen-lockfile
      - npm run build

run:
  command: node server.js
  network:
    port: 3000
    env: PORT

  # ── Runtime environment variables ──────────────────────────────────────────
  # Non-secret values — safe to store as plain text in App Runner.
  env:
    - name: NODE_ENV
      value: production
    - name: NEXT_TELEMETRY_DISABLED
      value: "1"
    - name: LOG_LEVEL
      value: info
    - name: ALLOW_REGISTRATION
      value: "false"
    - name: MYSQL_PORT
      value: "3306"

  # Secrets — store these in AWS Secrets Manager, then reference by ARN.
  # In the App Runner console: Configuration → Environment variables → Add from Secrets Manager
  # Required secrets:
  #   JWT_SECRET       — openssl rand -base64 32
  #   MYSQL_HOST       — your RDS endpoint (e.g. crm-db.xxxx.us-east-1.rds.amazonaws.com)
  #   MYSQL_USER       — your RDS username
  #   MYSQL_PASSWORD   — your RDS password
  #   MYSQL_DATABASE   — your database name (e.g. retail_crm)
